<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hand Detector Debug Console</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 20px; }
    h1 { color: #4ec9b0; margin-bottom: 4px; }
    .subtitle { color: #808080; font-size: 13px; margin-bottom: 20px; }
    .section { margin-bottom: 16px; }
    .section-title { color: #569cd6; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    .status-bar { background: #252526; border: 1px solid #3c3c3c; padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; }
    .status-running { color: #4ec9b0; }
    .status-stopped { color: #f44747; }
    button {
      background: #0e639c; color: #fff; border: none; padding: 6px 16px;
      margin-right: 8px; margin-bottom: 8px; cursor: pointer; border-radius: 3px; font-size: 13px;
    }
    button:hover { background: #1177bb; }
    button.danger { background: #6c2020; }
    button.danger:hover { background: #8c2020; }
    button.secondary { background: #3c3c3c; }
    button.secondary:hover { background: #505050; }
    #log-panel {
      width: 100%; height: 400px; background: #0d0d0d; color: #4ec9b0;
      border: 1px solid #3c3c3c; padding: 10px; box-sizing: border-box;
      font-size: 12px; line-height: 1.6; overflow-y: auto; white-space: pre-wrap;
      border-radius: 4px; resize: vertical;
    }
    .response-bar { background: #252526; border: 1px solid #3c3c3c; padding: 6px 10px; border-radius: 3px; font-size: 12px; color: #9cdcfe; margin-top: 8px; min-height: 24px; }
    .auto-refresh-label { color: #808080; font-size: 12px; margin-left: 8px; vertical-align: middle; }
    input[type=checkbox] { vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>
  <h1>Hand Detector Debug Console</h1>
  <div class="subtitle" id="app-uri">URI: 로딩 중...</div>

  <div class="section">
    <div class="section-title">상태</div>
    <div class="status-bar" id="status-bar">Info를 눌러 상태를 조회하세요.</div>
  </div>

  <div class="section">
    <div class="section-title">컨트롤</div>
    <button onclick="doStart()">▶ Start</button>
    <button onclick="doStop()" class="danger">■ Stop</button>
    <button onclick="doInfo()" class="secondary">ℹ Info</button>
    <button onclick="doTest()" class="secondary">✉ Test Log</button>
  </div>

  <div class="section">
    <div class="section-title">설정</div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <label style="color:#808080;font-size:13px">Confidence
        <input type="range" id="conf-slider" min="0.05" max="0.95" step="0.05" value="0.75"
               oninput="document.getElementById('conf-val').textContent=this.value">
        <span id="conf-val" style="color:#4ec9b0">0.75</span>
      </label>
      <label style="color:#808080;font-size:13px">NMS IoU
        <input type="range" id="nms-slider" min="0.1" max="0.9" step="0.05" value="0.45"
               oninput="document.getElementById('nms-val').textContent=this.value">
        <span id="nms-val" style="color:#4ec9b0">0.45</span>
      </label>
      <label style="color:#808080;font-size:13px">MQTT Broker
        <input type="text" id="mqtt-host" value="192.168.1.80" style="width:130px;background:#0d0d0d;color:#4ec9b0;border:1px solid #3c3c3c;padding:2px 6px;font-family:monospace;font-size:13px">
      </label>
      <button onclick="applyConfig()">적용</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">디버그 로그</div>
    <button onclick="fetchLogs()">⟳ Refresh Logs</button>
    <button onclick="clearLogs()" class="danger">✕ Clear Logs</button>
    <label class="auto-refresh-label">
      <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()"> 3초마다 자동 갱신
    </label>
    <textarea id="log-panel" readonly>(Refresh Logs 버튼을 클릭하세요)</textarea>
  </div>

  <div class="section">
    <div class="section-title">마지막 응답</div>
    <div class="response-bar" id="last-response">-</div>
  </div>

  <script>
    const paths = window.location.pathname.split('/');
    const app_id = paths[5] || 'hand_detector';
    const base_uri = `${window.location.protocol}//${window.location.hostname}:${window.location.port}/opensdk/${app_id}/configuration`;
    document.getElementById('app-uri').textContent = 'URI: ' + base_uri;

    let autoRefreshTimer = null;

    function setResponse(text) {
      document.getElementById('last-response').textContent = text;
    }

    function updateStatusBar(data) {
      const state = data.state || '?';
      const stateClass = state === 'running' ? 'status-running' : 'status-stopped';
      document.getElementById('status-bar').innerHTML =
        `<span style="color:#808080">state: </span><span class="${stateClass}">${state}</span>  ` +
        `<span style="color:#808080">model: </span><span style="color:#ce9178">${data.model || '-'}</span>  ` +
        `<span style="color:#808080">confidence: </span><span style="color:#ce9178">${data.confidence_threshold ?? '-'}</span>  ` +
        `<span style="color:#808080">nms: </span><span style="color:#ce9178">${data.nms_iou_threshold ?? '-'}</span>`;
    }

    function api(mode) {
      return fetch(base_uri, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: mode })
      });
    }

    function doStart() {
      api('start').then(r=>r.json()).then(d=>{setResponse(JSON.stringify(d));fetchLogs()}).catch(e=>setResponse('Error: '+e));
    }
    function doStop() {
      api('stop').then(r=>r.json()).then(d=>{setResponse(JSON.stringify(d));fetchLogs()}).catch(e=>setResponse('Error: '+e));
    }
    function doInfo() {
      api('info').then(r=>r.json()).then(d=>{
        setResponse(JSON.stringify(d));updateStatusBar(d);fetchLogs();
        if(d.confidence_threshold!=null){
          document.getElementById('conf-slider').value=d.confidence_threshold;
          document.getElementById('conf-val').textContent=d.confidence_threshold.toFixed(2);
        }
        if(d.nms_iou_threshold!=null){
          document.getElementById('nms-slider').value=d.nms_iou_threshold;
          document.getElementById('nms-val').textContent=d.nms_iou_threshold.toFixed(2);
        }
        if(d.mqtt_broker_host){
          document.getElementById('mqtt-host').value=d.mqtt_broker_host;
        }
      }).catch(e=>setResponse('Error: '+e));
    }
    function doTest() {
      api('test').then(r=>r.json()).then(d=>{setResponse(JSON.stringify(d));fetchLogs()}).catch(e=>setResponse('Error: '+e));
    }
    function applyConfig() {
      const conf = parseFloat(document.getElementById('conf-slider').value);
      const nms = parseFloat(document.getElementById('nms-slider').value);
      const mqttHost = document.getElementById('mqtt-host').value.trim();
      const body = { mode: 'config', confidence_threshold: conf, nms_iou_threshold: nms };
      if (mqttHost) body.mqtt_broker_host = mqttHost;
      fetch(base_uri, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(r=>r.json()).then(d=>{setResponse('Config: conf='+conf+' nms='+nms+' mqtt='+mqttHost);fetchLogs()}).catch(e=>setResponse('Error: '+e));
    }

    function fetchLogs() {
      api('log').then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
        .then(entries=>{
          const p=document.getElementById('log-panel');
          if(!Array.isArray(entries)||!entries.length){p.value='(로그 없음)'}
          else{p.value=entries.join('\n');p.scrollTop=p.scrollHeight}
        }).catch(e=>{document.getElementById('log-panel').value='Error: '+e});
    }
    function clearLogs() {
      api('clear').then(r=>r.json()).then(d=>{setResponse(JSON.stringify(d));fetchLogs()}).catch(e=>setResponse('Error: '+e));
    }
    function toggleAutoRefresh() {
      if(document.getElementById('auto-refresh').checked){autoRefreshTimer=setInterval(fetchLogs,3000)}
      else{clearInterval(autoRefreshTimer);autoRefreshTimer=null}
    }

    let liveTimer = null;
    function toggleLive() {
      if (liveTimer) {
        clearInterval(liveTimer); liveTimer = null;
        document.getElementById('live-btn').textContent = '▶ 라이브';
      } else {
        liveTimer = setInterval(doCapture, 200);
        document.getElementById('live-btn').textContent = '■ 중지';
      }
    }

    function doCapture() {
      document.getElementById('cap-status').textContent = '캡처 중...';
      api('capture').then(r=>r.json()).then(d=>{
        if(d.error){
          document.getElementById('cap-status').textContent='Error: '+d.error+(d.log?' ('+d.log+')':'');
          return;
        }
        const c=document.getElementById('still-canvas'), ctx=c.getContext('2d');
        // 1) 그레이스케일 프레임 그리기
        if(d.gray && d.w && d.h){
          const bin=atob(d.gray);
          const pixels=d.w*d.h;
          const isRgb=(bin.length>=pixels*3);
          const id=ctx.createImageData(d.w, d.h);
          for(let i=0;i<pixels;i++){
            if(isRgb){
              id.data[i*4]=bin.charCodeAt(i*3);
              id.data[i*4+1]=bin.charCodeAt(i*3+1);
              id.data[i*4+2]=bin.charCodeAt(i*3+2);
            } else {
              const v=bin.charCodeAt(i);
              id.data[i*4]=v; id.data[i*4+1]=v; id.data[i*4+2]=v;
            }
            id.data[i*4+3]=255;
          }
          // 480x270 → 640x360으로 스케일
          const tmp=document.createElement('canvas');
          tmp.width=d.w; tmp.height=d.h;
          tmp.getContext('2d').putImageData(id,0,0);
          ctx.drawImage(tmp, 0, 0, c.width, c.height);
        }
        // 2) 바운딩 박스 그리기
        const fw=d.frame_w||1920, fh=d.frame_h||1080;
        const sx=c.width/fw, sy=c.height/fh;
        if(d.detections){
          for(let i=0;i<d.detections.length;i++){
            const det=d.detections[i];
            const x=det.x1*sx, y=det.y1*sy, bw=(det.x2-det.x1)*sx, bh=(det.y2-det.y1)*sy;
            const conf=Math.round(det.conf*100);
            ctx.strokeStyle=conf>=90?'#ff4444':'#44ff44';
            ctx.lineWidth=2; ctx.strokeRect(x,y,bw,bh);
            ctx.fillStyle='rgba(0,0,0,0.6)';
            ctx.fillRect(x,y-16,80,16);
            ctx.fillStyle=ctx.strokeStyle;
            ctx.font='bold 11px monospace';
            ctx.fillText('Hand '+conf+'%',x+2,y-4);
          }
        }
        document.getElementById('cap-status').textContent=
          'Det: '+(d.detections?d.detections.length:0)+' | '+d.log;
      }).catch(e=>{document.getElementById('cap-status').textContent='Error: '+e;});
    }

    window.onload = function() {
      doInfo();
      fetchLogs();
    };
  </script>
</body>
</html>
