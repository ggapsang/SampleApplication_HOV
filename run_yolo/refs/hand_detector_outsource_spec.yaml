# =============================================================================
# Hand Detection App — 외주 개발 스펙 정의서
# =============================================================================
# 본 문서는 외주 개발사에 전달하는 기술 스펙 정의서임.
# TODO 표기 항목은 PM이 실측값으로 채워 넣을 것.
# 작성일: 2026-03-23
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 타겟 환경
# -----------------------------------------------------------------------------
target:
  camera_model: PNV-A9082RZ
  soc: wn9
  npu: Vivante (VisioNexT)
  sdk_version: "25.04.09"
  sdk_docker_image: "opensdk:25.04.09"
  language: C++17
  build_system: CMake
  cross_compile: ARM64 (aarch64-linux-gnu)

# -----------------------------------------------------------------------------
# 2. 모델 스펙
# -----------------------------------------------------------------------------
model:
  framework: YOLOv11s (Ultralytics)
  task: detection
  classes:
    count: 1
    names:
      0: hand
  file:
    format: .nb                          # APL_AI Compiler 산출물, 확장자 그대로 사용
    filename: network_binary.nb           # TODO: 실제 파일명으로 교체
    deploy_path: "../res/ai_bin/"        # LoadNetwork() 상대 경로

# -----------------------------------------------------------------------------
# 3. 입력 텐서 스펙
#    - Netron에서 .onnx 열어 입력 노드 확인
#    - APL_AI inputmeta.yml 설정값과 대조
# -----------------------------------------------------------------------------
input_tensor:
  name: "images"                         # TODO: Netron에서 확인한 입력 텐서 이름
  shape: [1, 3, 640, 640]               # TODO: Netron에서 확인한 shape [N, C, H, W]
  layout: NCHW                           # ONNX 원본 기준
  npu_input_layout: NHWC                 # NPU 실행 시 (add_preproc_node: true 시 NPU가 변환 처리)
  dtype: UINT8                           # add_preproc_node: true → NPU에 UINT8 입력
  color_space: RGB                       # inputmeta.yml reverse_channel: false → RGB
  resolution:
    width: 640                           # TODO: 실제 모델 입력 해상도
    height: 640                          # TODO: 실제 모델 입력 해상도

# -----------------------------------------------------------------------------
# 4. 전처리 파라미터
#    - APL_AI inputmeta.yml 기반
#    - add_preproc_node 여부에 따라 LoadNetwork() mean/scale 값 결정
# -----------------------------------------------------------------------------
preprocessing:
  # APL_AI Compiler 설정 (inputmeta.yml)
  apl_ai_config:
    reverse_channel: false               # TODO: inputmeta.yml 확인
    mean: [0.0, 0.0, 0.0]               # TODO: inputmeta.yml 확인
    scale: [0.003921, 0.003921, 0.003921]  # TODO: 1/255 = 0.003921
    add_preproc_node: true               # TODO: inputmeta.yml 확인
    preproc_type: IMAGE_RGB              # TODO: inputmeta.yml 확인

  # LoadNetwork() 호출 시 전달할 값
  # add_preproc_node: true → NPU 내부 정규화 처리 → mean/scale 무효화
  # add_preproc_node: false → 앱 단에서 정규화 후 전달
  load_network_params:
    mean: [0.0, 0.0, 0.0]               # add_preproc_node: true 시 [0,0,0]
    scale: [1.0, 1.0, 1.0]              # add_preproc_node: true 시 [1,1,1]

  # 리사이즈 방식
  resize:
    method: letterbox                    # YOLO 계열 표준 전처리
    interpolation: INTER_LINEAR          # OpenCV cv::INTER_LINEAR
    pad_value: 114                       # letterbox 패딩 픽셀값 (YOLO 기본)
    keep_aspect_ratio: true

# -----------------------------------------------------------------------------
# 5. 출력 텐서 스펙
#    - Netron에서 .onnx 출력 노드 확인
#    - APL_AI ./inference 결과 .tensor 파일명에서 NPU 출력 shape 확인
#    - 파일명 패턴: iter_{n}_{node_name}_out0_{shape}.tensor
# -----------------------------------------------------------------------------
output_tensors:
  - name: "output0"                      # TODO: Netron에서 확인한 출력 텐서 이름
    shape: [1, 5, 8400]                  # TODO: Netron 확인 [batch, 4+num_classes, num_detections]
    dtype: FLOAT32                       # add_postproc_node: true → NPU에서 역양자화 완료
    description: "바운딩 박스(4) + class confidence(1) x 8400 detections"

  # 출력 헤드가 여러 개인 경우 (multi-head export 시)
  # - name: "output1"                    # TODO: 있을 경우 추가
  #   shape: [1, ...]
  #   dtype: FLOAT32

  # APL_AI Compiler 설정 (postprocess_file.yml)
  apl_ai_postproc:
    add_postproc_node: true              # TODO: postprocess_file.yml 확인
    force_float32: true
    description: "true → NPU 출력이 FLOAT32 역양자화 완료 상태"

# -----------------------------------------------------------------------------
# 6. 후처리 스펙
# -----------------------------------------------------------------------------
postprocessing:
  # YOLOv11 출력 디코딩
  decode:
    # 출력 텐서 레이아웃 (shape 기준)
    # [1, 5, 8400] → dim0=batch, dim1=4+nc, dim2=num_detections
    # row 0~3: cx, cy, w, h (center format, 모델 입력 해상도 기준)
    # row 4: class confidence (hand)
    format: center_xywh                  # center_x, center_y, width, height
    coordinate_system: model_input       # 모델 입력 해상도(640x640) 기준 좌표
    needs_sigmoid: false                 # TODO: YOLOv11 export 방식에 따라 확인

  # NMS 파라미터
  nms:
    confidence_threshold: 0.5            # 기본값, 웹 UI에서 조정 가능
    iou_threshold: 0.45                  # 기본값, 웹 UI에서 조정 가능
    max_detections: 100                  # 프레임당 최대 탐지 수

  # 좌표 역변환
  coordinate_transform:
    description: "모델 입력 해상도 → 원본 프레임 해상도 역변환"
    steps:
      - "letterbox 패딩 오프셋 제거"
      - "리사이즈 비율 역산 (scale_x, scale_y)"
      - "center_xywh → xyxy 변환 (x1, y1, x2, y2)"
      - "원본 해상도 범위 클램핑"

# -----------------------------------------------------------------------------
# 7. 결과 출력 — ONVIF 메타데이터
# -----------------------------------------------------------------------------
output_onvif:
  metadata_type: frame_metadata
  send_target: MetadataManager
  event_type: eRequestMetadata
  min_interval_ms: 30                    # SDK QoS 제약

  frame_metadata:
    fields:
      - timestamp: uint64_t              # 프레임 PTS
      - resolution: [width, height]      # 원본 프레임 해상도
      - objects:                          # 탐지된 객체 리스트
          bbox: [x1, y1, x2, y2]         # 원본 해상도 기준
          confidence: float
          class_name: string

  event_metadata:
    topic: "tns1:VideoSource/tnssamsung:hand_detector"
    data_fields:
      State: boolean                     # 탐지 여부
      DetectionCount: int                # 탐지 객체 수
      MaxConfidence: float               # 최대 신뢰도
    broadcasting: true

# -----------------------------------------------------------------------------
# 8. 결과 출력 — OSD 오버레이
# -----------------------------------------------------------------------------
output_osd:
  send_target: SRMgrVideo
  event_type: eExternalMultiLineOsd
  format: "Hand: {count} | FPS: {fps} | Conf: {max_conf:.2f}"
  position: TopLeft
  font_size: Small
  color: White

# -----------------------------------------------------------------------------
# 9. 결과 출력 — 알람
# -----------------------------------------------------------------------------
output_alarm:
  send_target: ConfigurableAlarmOut
  event_type: eRelayRequest

  trigger:
    mode: consecutive_frames             # N프레임 연속 탐지 시 알람 ON
    on_threshold: 5                      # 5프레임 연속 탐지 → 알람 ON
    off_threshold: 30                    # 30프레임 미탐지 → 알람 OFF
    cooldown_sec: 10                     # 알람 해제 후 재트리거 방지 대기 시간

# -----------------------------------------------------------------------------
# 10. MQTT 로깅
# -----------------------------------------------------------------------------
mqtt:
  library: paho-mqtt-c                   # Eclipse Paho MQTT C (app/libs에 배치)
  fallback: network_manager_tcp          # Paho 크로스컴파일 실패 시 대안

  broker:
    host: ""                             # attribute JSON에서 로드 (웹 UI 설정)
    port: 1883
    qos: 0                               # 디버깅 용도, fire-and-forget
    client_id: "hand_detector_{cam_id}"

  reconnect:
    strategy: exponential_backoff
    max_retries: 5
    initial_delay_ms: 1000
    non_blocking: true                   # 연결 실패가 추론 파이프라인에 영향 없음

  topics:
    detection:
      path: "cam/{cam_id}/hand/detection"
      payload_example: |
        {
          "frame_id": 12345,
          "timestamp": "2026-03-23T10:30:00.123Z",
          "detections": [
            {"bbox": [100, 200, 300, 400], "conf": 0.87, "class": "hand"}
          ]
        }

    status:
      path: "cam/{cam_id}/hand/status"
      payload_example: |
        {
          "state": "running",
          "model": "network_binary.nb",
          "uptime_sec": 3600,
          "total_detections": 15234
        }

    debug:
      path: "cam/{cam_id}/hand/debug"
      payload_example: |
        {
          "preprocess_ms": 2.1,
          "inference_ms": 15.3,
          "postprocess_ms": 1.2,
          "total_fps": 45.2,
          "memory_usage_mb": 128
        }

    alarm:
      path: "cam/{cam_id}/hand/alarm"
      payload_example: |
        {
          "event": "triggered",
          "trigger_count": 5,
          "max_confidence": 0.92,
          "timestamp": "2026-03-23T10:30:05.000Z"
        }

# -----------------------------------------------------------------------------
# 11. 웹 UI 요구사항
# -----------------------------------------------------------------------------
web_ui:
  path: "app/html/index.html"
  api_endpoint: "/stream?mode=view"
  request_format: JSON

  controls:
    - mode: start                        # 추론 시작
    - mode: stop                         # 추론 중지
    - mode: info                         # 상태 조회
    - mode: config                       # 파라미터 변경

  configurable_params:
    - key: confidence_threshold
      type: float
      range: [0.1, 1.0]
      default: 0.5

    - key: nms_iou_threshold
      type: float
      range: [0.1, 1.0]
      default: 0.45

    - key: skip_frames
      type: int
      range: [0, 30]
      default: 0
      description: "0=전 프레임 추론, N=N프레임마다 1회 추론"

    - key: mqtt_broker_host
      type: string
      default: ""

    - key: mqtt_broker_port
      type: int
      default: 1883

    - key: alarm_on_threshold
      type: int
      default: 5

    - key: alarm_cooldown_sec
      type: int
      default: 10

  status_display:
    - current_fps
    - inference_time_ms
    - detection_count
    - model_name
    - mqtt_connection_status
    - alarm_state

# -----------------------------------------------------------------------------
# 12. 참조 자료
# -----------------------------------------------------------------------------
references:
  sample_code:
    repo: "github.com/ggapsang/SampleApplication_HOV"
    key_files:
      - "run_yolo/app/src/classification/classification.cc"     # 추론 파이프라인 참조
      - "run_yolo/app/src/classification/includes/classification.h"
      - "run_yolo/app/src/classification/manifests/"            # 매니페스트 구조 참조

  documents:
    - name: "Programming_Guide.pdf"
      description: "OpenSDK 개발 가이드 (프로젝트 구조, 빌드, 매니페스트)"
    - name: "HanwhaVision_OpenPlatform_SDK_API_25_04_09.pdf"
      description: "SDK API 레퍼런스 (이벤트, 메타데이터, 네트워크 매니저)"
    - name: "APL_AI_Compiler_Guide_v1_02_20250918.pdf"
      description: "NPU 모델 컴파일러 가이드"
    - name: "Hanwha_OpenSDK_Architecture_Analysis.md"
      description: "아키텍처 분석 문서 (DFD, 컴포넌트 라이프사이클)"
    - name: "npu_dataflow.mermaid"
      description: "NPU 데이터 플로우 다이어그램"

