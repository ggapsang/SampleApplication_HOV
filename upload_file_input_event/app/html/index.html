<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Upload File Input Event</title>
</head>

<body>
    <h1>Upload File Input Event</h1>
    <h2>Upload File Info</h2>
    <form>
        <button type="button" onclick="sendData()">Get</button>
        <div id="conf"></div>
    </form>
    <hr>

    <div id="infos" />

    <script>
        const sendData = () => {
            const paths = window.location.pathname.split('/');
            const app_id = paths[5];

            const uri = `${window.location.protocol}//${window.location.hostname}:${window.location.port}/opensdk/${app_id}/configuration`;

            fetch(uri)
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('Request error');
                })
                .then(data => {
                    console.log(data.infos);

                    const infos = document.getElementById('infos');
                    let infoString = '';
                    data.infos.forEach(i => {
                        infoString += `<tr><td>${i.app}</td><td>${i.filename}</td></tr>`
                    });
                    infos.innerHTML = `<table><tr><th scope="col">AppName</td><th scope="col">FileName</td></tr>${infoString}</table>`;
                })
                .catch(error => {
                    console.error('Error', error);
                })
        }
    </script>
</body>

</html>
